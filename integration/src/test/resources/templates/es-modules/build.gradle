import org.gradle.api.attributes.Attribute

kotlin {
    js("jsEs") {
        nodejs()
        useEsModules()
    }
    js("jsUmd") {
        nodejs()
    }
    js("jsCommon") {
        nodejs()
        useCommonJs()
    }
}

def jsTargetDisambiguation = Attribute.of("org.jetbrains.kotlinx.benchmark.js.target", String)
["jsEs", "jsUmd", "jsCommon"].each { targetName ->
    configurations.matching { it.canBeConsumed && it.name.startsWith(targetName) }.configureEach {
        attributes.attribute(jsTargetDisambiguation, targetName)
    }
}

benchmark {
    targets {
        register("jsEs")
        register("jsUmd")
        register("jsCommon")
    }
}
